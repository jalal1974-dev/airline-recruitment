kind = "web"
previewPath = "/"
title = "Jordan Aviation Recruitment"
version = "1.0.0"
id = "artifacts/jordan-aviation"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19853

[services.development]
run = "pnpm --filter @workspace/jordan-aviation run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jordan-aviation", "run", "build" ]
publicDir = "artifacts/jordan-aviation/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19853"
BASE_PATH = "/"
