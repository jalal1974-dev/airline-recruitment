kind = "web"
previewPath = "/"
title = "Jordan Aviation Recruitment"
version = "1.0.0"
id = "artifacts/jordan-aviation"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19853

[services.development]
run = "pnpm --filter @workspace/jordan-aviation run dev"

[services.production]
publicDir = "artifacts/jordan-aviation/dist/public"
serve = "static"

[services.production.build]
args = [ "pnpm", "--filter", "@workspace/jordan-aviation", "run", "build" ]

[services.production.build.env]
PORT = "3000"
BASE_PATH = "/"
NODE_ENV = "production"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19853"
BASE_PATH = "/"
